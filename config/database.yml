# config/database.yml

default: &default
  adapter: sqlite3 # SQLite3アダプタを指定
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %> # 環境変数からデータベースURLを取得

test:
  <<: *default
  # テスト環境のデータベース設定
  database: db/test.sqlite3 # 通常はテスト用のファイルパスを指定
  # または、テスト環境でもDATABASE_URLを使う場合は以下
  # url: <%= ENV['DATABASE_URL'] %>

production:
  <<: *default
  # 本番環境のデータベース設定 (必要に応じて修正)
  # SQLite3を本番で使うことは稀ですが、もし使うなら以下
  database: db/production.sqlite3
  # 本番では環境変数で渡すのが一般的
  # url: <%= ENV['DATABASE_URL'] %>
